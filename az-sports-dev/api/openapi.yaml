  /api/v1/ml/projection:
    get:
      operationId: "getMlProjection"
      tags:
        - "ML"
      summary: "Fetch one projection lookup"
      description: "Premium route that requires player, stat, and sport query parameters."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Fetch one projection lookup response."
          headers:
