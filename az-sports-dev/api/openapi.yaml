      parameters:
        - name: "sport"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "days_ahead"
          in: "query"
          required: false
          schema:
            type: "integer"
            minimum: 1
            maximum: 30
  /api/v1/futures/{sport}/{prop_id}/drift:
    get:
      operationId: "getFuturesDrift"
      tags:
        - "Futures"
      summary: "Read the futures drift history for one prop"
      description: "Returns a drift-history array with display-safe score fields."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Read the futures drift history for one prop response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
