          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "prop_id"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "days_ahead"
          in: "query"
          required: false
          schema:
            type: "integer"
            minimum: 1
            maximum: 30
