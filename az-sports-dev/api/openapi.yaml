components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "API key"
      description: "Send `Authorization: Bearer <azs_...>` with a managed API key."
  headers:
    RateLimitLimit:
      description: "The active per-minute request ceiling for the authenticated caller."
      schema:
        type: "integer"
        minimum: 1
    RateLimitRemaining:
      description: "The remaining request count in the current rolling minute window."
      schema:
        type: "integer"
        minimum: 0
    RateLimitReset:
      description: "Unix timestamp for the start of the next request window."
      schema:
        type: "integer"
    RetryAfter:
      description: "Number of seconds to wait before retrying the same request."
      schema:
        type: "integer"
        minimum: 0
  responses:
    BadRequest:
      description: "BAD_REQUEST: The request shape or parameter values were invalid."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: "AZS_AUTH_001: Missing or invalid bearer token or API key. AZS_AUTH_002: Additional account verification is required before the action can continue. AZS_AUTH_003: The credential expired or could not be verified."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: "AZS_AUTH_004: The account behind the credential is suspended. AZS_PERM_001: The caller lacks the required subscription tier for the endpoint. AZS_PERM_002: The API key does not have access to the requested endpoint. AZS_PERM_003: The credential is not permitted to access this operation."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: "AZS_DATA_001: The requested sport was not recognized. AZS_DATA_002: The requested route or game resource was not found. AZS_DATA_003: The requested prop resource was not found."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    TooManyRequests:
      description: "AZS_RATE_001: The caller exceeded the active rate limit window. AZS_RATE_002: A behavioral rate downgrade was applied."
      headers:
        retry-after:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServerError:
      description: "The API returned a sanitized server error with a trace identifier."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ServiceUnavailable:
      description: "AZS_SYS_002: The service is temporarily unavailable."
      headers:
        retry-after:
          $ref: "#/components/headers/RetryAfter"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    ErrorEnvelope:
      type: "object"
      additionalProperties: false
      required:
        - "code"
        - "message"
      properties:
        code:
          type: "string"
        message:
          type: "string"
        trace_id:
          type: "string"
    SgpLeg:
      type: "object"
      additionalProperties: false
      required:
        - "player"
        - "stat"
        - "line"
        - "direction"
      properties:
        player:
          type: "string"
        stat:
          type: "string"
        line:
          type: "number"
        direction:
          type: "string"
          enum:
            - "over"
            - "under"
    SgpEvaluateRequest:
      type: "object"
      additionalProperties: false
      required:
        - "sport"
        - "game_id"
        - "sportsbook_parlay_odds"
        - "legs"
      properties:
        sport:
          type: "string"
        game_id:
          type: "string"
        sportsbook_parlay_odds:
          type: "number"
        legs:
          type: "array"
          minItems: 1
          items:
            $ref: "#/components/schemas/SgpLeg"
    getHealthResponse:
