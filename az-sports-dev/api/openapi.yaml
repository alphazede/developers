openapi: "3.1.0"
info:
  title: "AlphaZede Sports API"
  version: "v1"
  summary: "REST endpoints for slate discovery, gameboard views, line movement, futures markets, game forecasts, prop edges, forecast streaming, alerts, fantasy tooling, projection lookups, premium analysis tools, and authenticated developer account management."
  description: "Public REST contract for AlphaZede Sports developer integrations.\nContract version: 2026-04-01."
  contact:
    name: "AlphaZede Sports Developer Support"
    url: "https://alphazedesports.com/contact"
  license:
    name: "Apache-2.0"
    url: "https://www.apache.org/licenses/LICENSE-2.0.html"
externalDocs:
  description: "Public AlphaZede Sports developer repository."
  url: "https://github.com/alphazede/developers/tree/main/az-sports-dev"
servers:
  - url: "https://api.alphazedesports.com"
    description: "Production AlphaZede Sports API."
security:
  - bearerAuth: []
tags:
  - name: "Health"
    description: "Health public API operations."
  - name: "Games"
    description: "Games public API operations."
  - name: "Movement"
    description: "Movement public API operations."
  - name: "Futures"
    description: "Futures public API operations."
  - name: "Alerts"
    description: "Alerts public API operations."
  - name: "ML"
    description: "ML public API operations."
  - name: "Fantasy"
    description: "Fantasy public API operations."
  - name: "Arbitrage"
    description: "Arbitrage public API operations."
  - name: "DFS"
    description: "DFS public API operations."
  - name: "SGP"
    description: "SGP public API operations."
  - name: "Streaming"
    description: "Streaming public API operations."
  - name: "Forecasts"
    description: "Forecasts public API operations."
paths:
  /api/v1/health:
    get:
      operationId: "getHealth"
      tags:
        - "Health"
      summary: "Check API availability"
      description: "Returns a simple status object."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Check API availability response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getHealthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /api/v1/games/{sport}/{date}:
    get:
      operationId: "listGamesBySportAndDate"
      tags:
        - "Games"
      summary: "List games for a sport and date"
      description: "Date format is YYYY-MM-DD."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "List games for a sport and date response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listGamesBySportAndDateResponse"
              examples:
                example1:
                  summary: "List the NBA slate for a date"
                  description: "A minimal read request with bearer auth and an uppercase sport segment."
                  value:
                    games:
                      - game_id: "NBA_2026-04-01_BOS_NYK"
                        home_team: "BOS"
                        away_team: "NYK"
                        start_time: "2026-04-01T23:30:00Z"
                        status: "scheduled"
                        prop_count: 42
                        has_sharp_moves: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      parameters:
        - name: "sport"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "date"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
  /api/v1/games/{sport}/{game_id}/props:
    get:
      operationId: "listGameProps"
      tags:
        - "Games"
      summary: "Fetch display-safe props for one game"
      description: "Returns display-safe prop fields for public integrations."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Fetch display-safe props for one game response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listGamePropsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      parameters:
        - name: "sport"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "game_id"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
  /api/v1/gameboard/{sport}/{game_id}:
    get:
      operationId: "getGameboard"
      tags:
        - "Games"
      summary: "Fetch a full gameboard payload"
      description: "Includes game metadata plus obfuscated props."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Fetch a full gameboard payload response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getGameboardResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      parameters:
        - name: "sport"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "game_id"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
  /api/v1/movement/{sport}/{game_id}/{prop_id}/history:
    get:
      operationId: "getMovementHistory"
      tags:
        - "Movement"
      summary: "Read historical line movement for one prop"
      description: "Returns a time-ordered history array."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Read historical line movement for one prop response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/getMovementHistoryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      parameters:
        - name: "sport"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "game_id"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "prop_id"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
  /api/v1/futures/{sport}:
    get:
      operationId: "listFutures"
      tags:
        - "Futures"
      summary: "Fetch the futures market surface for a sport"
      description: "Accepts an optional days_ahead query parameter."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Fetch the futures market surface for a sport response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
              $ref: "#/components/headers/RateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/listFuturesResponse"
              examples:
                example1:
                  summary: "Read a futures market in Python"
                  description: "The futures endpoint accepts an optional `days_ahead` query parameter between 1 and 30."
                  value:
                    futures:
                      - game_id: "NBA_2026-04-05_DEN_LAL"
                        game_date: "2026-04-05"
                        home_team: "DEN"
                        away_team: "LAL"
                        early_lines:
                          - prop_id: "prop-1"
                            player: "Nikola Jokic"
                            stat: "points"
                            line: 28.5
                            opening_line: 27.5
                            line_movement: 1
                            velocity_class: "SHARP"
                            sharpest_books:
                              - book: "FanDuel"
                                line_movement: 1.5
                            drift_history:
                              - timestamp: "2026-04-01T14:00:00Z"
                                line: 27.5
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/ServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
      parameters:
        - name: "sport"
          in: "path"
          required: true
          schema:
            type: "string"
            minLength: 1
        - name: "days_ahead"
          in: "query"
          required: false
          schema:
            type: "integer"
            minimum: 1
            maximum: 30
  /api/v1/futures/{sport}/market:
    get:
      operationId: "listFuturesMarket"
      tags:
        - "Futures"
      summary: "Alias for the futures market response"
      description: "Shares the same payload and query rules as /api/v1/futures/{sport}."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Alias for the futures market response response."
          headers:
            x-ratelimit-limit:
              $ref: "#/components/headers/RateLimitLimit"
            x-ratelimit-remaining:
              $ref: "#/components/headers/RateLimitRemaining"
            x-ratelimit-reset:
