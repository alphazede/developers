name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '47 8 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: Semgrep scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep==1.164.0

      - name: Run Semgrep
        run: semgrep scan --config p/secrets --config p/javascript --config p/typescript --error az-sports-dev bearing
