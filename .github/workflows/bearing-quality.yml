name: Bearing quality

on:
  push:
    paths:
      - 'bearing/**'
      - '.github/workflows/bearing-quality.yml'
      - '.github/workflows/bearing-publish.yml'
  pull_request:
    paths:
      - 'bearing/**'
      - '.github/workflows/bearing-quality.yml'
      - '.github/workflows/bearing-publish.yml'

permissions:
  contents: read

concurrency:
  group: bearing-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install
        working-directory: bearing
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: bearing
        run: pnpm typecheck

      - name: Test
        working-directory: bearing
        run: pnpm test

      - name: Integration test
        working-directory: bearing
        run: pnpm test:integration

      - name: Build
        working-directory: bearing
        run: pnpm build

      - name: Native synthetic evaluation
        working-directory: bearing
        run: pnpm eval:native

      - name: Audit
        working-directory: bearing
        run: pnpm audit --audit-level=moderate

      - name: Check package contents
        working-directory: bearing
        run: npm pack --dry-run --json
