name: Capacity Scheduling Verify

on:
  push:
    paths:
      - 'window/**'
      - '.github/workflows/window-verify.yml'
  pull_request:
    paths:
      - 'window/**'
      - '.github/workflows/window-verify.yml'

permissions:
  contents: read

concurrency:
  group: window-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify capacity scheduling package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: window

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.14.0 --activate

      - name: Install reviewed dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify
        run: sh ./tools/ci/verify.sh
