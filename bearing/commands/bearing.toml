description = "Launch Bearing's local planning-first journey"
prompt = "Use this command only when the user explicitly invokes /bearing. From the current repository, launch the existing Bearing CLI with `start`. Keep PATH first: use the installed `bearing` executable when available. Otherwise load the installed Bearing skill resource and resolve `../../dist/cli.js` relative to that skill's `SKILL.md` directory, then run that absolute path with Node and `start`; never resolve the fallback from the current or target repository. Keep the resulting local server running, capture the loopback URL it prints, and report that URL to the user. Bearing best-effort opens the browser automatically. Then begin the Bearing planning-first journey through its local UI. If neither executable nor the installed plugin's dist CLI exists, report the missing build instead of scanning other filesystem roots, altering the target repository, installing software, or substituting another runtime. Do not launch on SessionStart, duplicate Bearing runtime logic, perform remote actions, or claim to change Codex native collaboration mode."
