description = "Launch Bearing's local planning-first journey"
prompt = "Use this command only when the user explicitly invokes /bearing. From the current repository, launch the existing Bearing CLI with `start --no-open`: use the installed `bearing` executable when available; otherwise use the package-local `bearing/dist/cli.js` with Node. Keep the resulting local server running, capture the loopback URL it prints, and report that URL to the user. Then begin the Bearing planning-first journey through its local UI. If neither executable nor package-local dist CLI exists, report the missing build instead of installing software or substituting another runtime. Do not launch on SessionStart, duplicate Bearing runtime logic, perform remote actions, or claim to change Codex native collaboration mode."
